# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: "AhTong's blog"
subtitle: "但盼风雨来,能留你在此"
description: ''
keywords:
author: "Ahtong"
language: zh-CN
timezone: "Asia/Shanghai"

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://blog.tongorz.top
#permalink: :year/:month/:day/:title/
# article之前一定不要加:，不然会生成一个叫 undefined文件夹
permalink: article/:year:month:day:abbrlink.html
abbrlink:
  alg: crc32  # 算法：crc16(default) and crc32
  rep: hex    # 进制：dec(default) and hex
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md         # 新文章的文件名称
default_layout: post             # 预设布局
auto_spacing: false              # 在中文和英文之间加入空格
titlecase: false                 # 把标题转换为 title case
external_link:                   # 在新标签中打开链接
  enable: true                   # 在新标签中打开链接
  field: site                    # 对整个网站 (site) 生效或仅对文章 (post) 生效
  exclude: []                    # 需要排除的域名。主域名和子域名如 www 需分别配置
filename_case: 0                 # 把文件名称转换为 (1) 小写或 (2) 大写
render_drafts: false             # 显示草稿，默认为：false
post_asset_folder: true          # 启动 Asset 文件夹
relative_link: false             # 把链接改为与根目录的相对位址
future: true                     # 显示未来的文章
syntax_highlighter: highlight.js
highlight:                       # 代码块的设置
  enable: true                   # 开启代码块高亮
  line_number: true              # 显示行数
  auto_detect: false             # 如果未指定语言，则启用自动检测
  tab_replace: ''                # 用 n 个空格替换 tabs；如果值为空，则不会替换 tabs
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''
